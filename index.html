<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>万花筒 Kaleidoscope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-tap-highlight-color: transparent;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 300px;
    }
    a {
      display: block;
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      text-align: center;
      font-size: 1rem;
      transition: background 0.2s;
    }
    a:hover, a:active {
      background: rgba(255,255,255,0.2);
    }
    .hint {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>万花筒 Kaleidoscope</h1>

    <a href="kaleidoscope-self.html">三棱镜万花筒 · Prism</a>

  </div>
  <p class="hint">点击进入后，允许摄像头权限即可使用。<br>需使用 HTTPS 或 localhost。</p>
</body>
</html>
