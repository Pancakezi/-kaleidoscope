<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>3-Mirror Prism Kaleidoscope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0c; }
    .app { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .viewport { width: min(90vw, 90vh); aspect-ratio: 1; max-width: 500px; }
    #canvas { display: block; width: 100%; height: 100%; background: #000; border-radius: 4px; }
    .btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; background: #333; color: #fff; font-size: 0.9rem; cursor: pointer; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="app">
    <div class="viewport"><canvas id="canvas"></canvas></div>
    <button class="btn" id="toggleBtn">Start Camera</button>
  </div>

  <script>
  /**
   * 3-Mirror Prism Kaleidoscope Simulation
   * - Iterative mirror reflection coordinate mapping (dihedral folding)
   * - Tube-like viewing depth with perspective recede
   * - Triangular prism geometry: 3 mirrors at 60° → 6-fold symmetry
   */

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let video = null, stream = null, animId = null;
  let texCanvas, texData;
  const WEDGE = Math.PI / 3; // 60° fundamental wedge for 3-mirror triangle

  function resize() {
    const s = Math.min(canvas.parentElement.offsetWidth, canvas.parentElement.offsetHeight);
    canvas.width = s;
    canvas.height = s;
  }
  resize();
  window.addEventListener('resize', resize);

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      video = document.createElement('video');
      video.srcObject = stream;
      video.autoplay = video.playsInline = video.muted = true;
      await new Promise((ok, err) => { video.onloadedmetadata = () => video.play().then(ok).catch(err); video.onerror = err; });
      await new Promise(r => { const c = () => video.readyState >= 2 && video.videoWidth > 0 ? r() : setTimeout(c, 50); c(); });
      document.getElementById('toggleBtn').textContent = 'Stop Camera';
      draw();
    } catch (e) { alert('Camera error: ' + (e.message || 'denied')); }
  }

  function stopCamera() {
    if (animId) cancelAnimationFrame(animId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    video = stream = null;
    document.getElementById('toggleBtn').textContent = 'Start Camera';
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  /** Fold angle into fundamental wedge [0, π/3] via iterative mirror reflections */
  function kaleidoFold(theta) {
    let t = ((theta % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    while (t > WEDGE) { t = 2 * WEDGE - t; if (t < 0) t = -t; }
    while (t < 0) { t = -t; }
    return Math.min(t, WEDGE - 1e-6);
  }

  /** Barycentric test: is (px,py) inside triangle (ax,ay)-(bx,by)-(cx,cy)? */
  function insideTriangle(px, py, ax, ay, bx, by, cx, cy) {
    const d = (by - cy) * (ax - cx) + (cx - bx) * (ay - cy);
    const w1 = ((by - cy) * (px - cx) + (cx - bx) * (py - cy)) / d;
    const w2 = ((cy - ay) * (px - cx) + (ax - cx) * (py - cy)) / d;
    const w3 = 1 - w1 - w2;
    return w1 >= 0 && w2 >= 0 && w3 >= 0;
  }

  /** Signed distance from point to triangle edge (for depth) */
  function triDepth(px, py, cx, cy, r) {
    const a0 = -Math.PI / 2;
    const v0 = [cx + r * Math.cos(a0), cy + r * Math.sin(a0)];
    const v1 = [cx + r * Math.cos(a0 + 2 * Math.PI / 3), cy + r * Math.sin(a0 + 2 * Math.PI / 3)];
    const v2 = [cx + r * Math.cos(a0 + 4 * Math.PI / 3), cy + r * Math.sin(a0 + 4 * Math.PI / 3)];
    const e0 = [v1[0] - v0[0], v1[1] - v0[1]];
    const e1 = [v2[0] - v1[0], v2[1] - v1[1]];
    const e2 = [v0[0] - v2[0], v0[1] - v2[1]];
    const toP0 = [px - v0[0], py - v0[1]];
    const toP1 = [px - v1[0], py - v1[1]];
    const toP2 = [px - v2[0], py - v2[1]];
    const n0 = Math.sqrt(e0[0]*e0[0]+e0[1]*e0[1]);
    const n1 = Math.sqrt(e1[0]*e1[0]+e1[1]*e1[1]);
    const n2 = Math.sqrt(e2[0]*e2[0]+e2[1]*e2[1]);
    const d0 = Math.abs((e0[0]*toP0[1]-e0[1]*toP0[0])/n0);
    const d1 = Math.abs((e1[0]*toP1[1]-e1[1]*toP1[0])/n1);
    const d2 = Math.abs((e2[0]*toP2[1]-e2[1]*toP2[0])/n2);
    const inradius = r * 0.5;
    const minD = Math.min(d0, d1, d2);
    return 1 - Math.min(1, minD / inradius);
  }

  function draw() {
    if (!video || video.readyState < 2) { animId = requestAnimationFrame(draw); return; }

    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h / 2;
    const r = Math.min(w, h) * 0.48;

    const vw = video.videoWidth, vh = video.videoHeight;
    const eyeR = Math.min(vw, vh) * 0.32;
    const eyeCx = vw / 2, eyeCy = vh * 0.25;
    const sx = Math.max(0, eyeCx - eyeR), sy = Math.max(0, eyeCy - eyeR);
    const ts = Math.min(eyeR * 2, vw - sx, vh - sy);

    if (!texCanvas || texCanvas.width !== ts) {
      texCanvas = document.createElement('canvas');
      texCanvas.width = texCanvas.height = Math.min(256, Math.max(64, ts));
    }
    const tw = texCanvas.width, th = texCanvas.height;
    const tc = texCanvas.getContext('2d');
    tc.drawImage(video, sx, sy, ts, ts, 0, 0, tw, th);
    texData = tc.getImageData(0, 0, tw, th);

    const a0 = -Math.PI / 2;
    const v0x = cx + r * Math.cos(a0), v0y = cy + r * Math.sin(a0);
    const v1x = cx + r * Math.cos(a0 + 2*Math.PI/3), v1y = cy + r * Math.sin(a0 + 2*Math.PI/3);
    const v2x = cx + r * Math.cos(a0 + 4*Math.PI/3), v2y = cy + r * Math.sin(a0 + 4*Math.PI/3);

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    const outData = ctx.createImageData(w, h);
    const step = 2;
    for (let py = 0; py < h; py += step) {
      for (let px = 0; px < w; px += step) {
        if (!insideTriangle(px, py, v0x, v0y, v1x, v1y, v2x, v2y)) continue;

        const dx = px - cx, dy = py - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const theta = Math.atan2(dy, dx);

        const thetaFolded = kaleidoFold(theta);
        const depth = triDepth(px, py, cx, cy, r);
        const scale = 0.15 + 0.85 * depth;
        const u = 0.5 + 0.5 * scale * Math.cos(thetaFolded + WEDGE / 2);
        const v = 0.5 + 0.5 * scale * Math.sin(thetaFolded + WEDGE / 2);

        const ti = Math.min(tw - 1, Math.max(0, Math.floor(u * tw)));
        const tj = Math.min(th - 1, Math.max(0, Math.floor(v * th)));
        const idx = (tj * tw + ti) * 4;
        const R = texData.data[idx];
        const G = texData.data[idx + 1];
        const B = texData.data[idx + 2];
        const A = texData.data[idx + 3];

        const fade = 0.6 + 0.4 * (1 - depth);
        const oi = (py * w + px) * 4;
        outData.data[oi] = Math.min(255, R * fade);
        outData.data[oi + 1] = Math.min(255, G * fade);
        outData.data[oi + 2] = Math.min(255, B * fade);
        outData.data[oi + 3] = 255;

        for (let dy = 0; dy < step && py + dy < h; dy++)
          for (let dx = 0; dx < step && px + dx < w; dx++) {
            const oi2 = ((py+dy) * w + (px+dx)) * 4;
            outData.data[oi2] = outData.data[oi];
            outData.data[oi2+1] = outData.data[oi+1];
            outData.data[oi2+2] = outData.data[oi+2];
            outData.data[oi2+3] = outData.data[oi+3];
          }
      }
    }

    ctx.putImageData(outData, 0, 0);
    animId = requestAnimationFrame(draw);
  }

  document.getElementById('toggleBtn').addEventListener('click', () => {
    if (video && stream) stopCamera();
    else startCamera();
  });
  </script>
</body>
</html>
