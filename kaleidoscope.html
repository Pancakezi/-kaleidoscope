<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>万花筒摄像头</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0c29;
      font-family: 'Noto Sans SC', sans-serif;
      color: #e8e6f0;
    }

    .canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #kaleidoscope {
      display: block;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
    }

    .overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.5rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: center;
      gap: 1rem;
      pointer-events: none;
    }

    .overlay > * {
      pointer-events: auto;
    }

    .controls {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0.8rem 1.2rem;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .control-group label {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(232, 230, 240, 0.9);
    }

    input[type="range"] {
      width: 140px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd89b, #f4a261);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(244, 162, 97, 0.5);
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .status {
      font-size: 0.85rem;
      color: rgba(232, 230, 240, 0.8);
      min-height: 1.2em;
      align-self: center;
    }

    .error {
      color: #ff6b6b;
    }

    @media (max-width: 600px) {
      .controls { flex-direction: column; }
      .overlay { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="canvas-container">
    <canvas id="kaleidoscope"></canvas>
  </div>

  <div class="overlay">
    <div class="controls">
      <div class="control-group">
        <label for="segments">镜片大小</label>
        <input type="range" id="segments" min="2" max="10" value="4" step="1">
      </div>
      <div class="control-group">
        <label for="radius">半径</label>
        <input type="range" id="radius" min="30" max="100" value="60" step="5">
      </div>
      <div class="control-group">
        <label for="eyePos">眼睛位置</label>
        <input type="range" id="eyePos" min="0" max="40" value="15" step="1">
      </div>
    </div>
    <p class="status" id="status">点击启动摄像头</p>
    <button class="btn" id="toggleBtn">启动摄像头</button>
    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.85rem;">
      <input type="checkbox" id="debugCheck"> 原始
    </label>
  </div>

  <script>
    const canvas = document.getElementById('kaleidoscope');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const toggleBtn = document.getElementById('toggleBtn');
    const segmentsInput = document.getElementById('segments');
    const radiusInput = document.getElementById('radius');
    const eyePosInput = document.getElementById('eyePos');

    let video = null;
    let stream = null;
    let animationId = null;
    let debugMode = false;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      if (!video || !stream) {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (isError ? ' error' : '');
    }

    async function startCamera() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('请使用 localhost 或 HTTPS 访问此页面');
        }
        setStatus('正在请求摄像头...');
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video = document.createElement('video');
        video.srcObject = stream;
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;

        await new Promise((resolve, reject) => {
          video.onloadedmetadata = () => video.play().then(resolve).catch(reject);
          video.onerror = reject;
        });

        await new Promise(resolve => {
          const check = () => {
            if (video.readyState >= 2 && video.videoWidth > 0) {
              resolve();
            } else {
              setTimeout(check, 50);
            }
          };
          check();
        });

        setStatus('摄像头已启动 ' + video.videoWidth + '×' + video.videoHeight);
        toggleBtn.textContent = '关闭摄像头';
        drawKaleidoscope();
      } catch (err) {
        setStatus('无法访问摄像头: ' + (err.message || '请允许摄像头权限'), true);
      }
    }

    function stopCamera() {
      if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video = null;
      toggleBtn.textContent = '启动摄像头';
      setStatus('摄像头已关闭');
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width || window.innerWidth, canvas.height || window.innerHeight);
    }

    function drawKaleidoscope() {
      if (!video || video.readyState < 2 || video.videoWidth === 0) {
        animationId = requestAnimationFrame(drawKaleidoscope);
        return;
      }

      const density = parseInt(segmentsInput.value, 10);
      const radiusPercent = parseInt(radiusInput.value, 10) / 100;
      const eyePercent = parseInt(eyePosInput.value, 10) / 100;

      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const vs = Math.min(vw, vh);
      const srcR = Math.max(10, (vs / 2) * radiusPercent);
      const sy = Math.max(0, Math.min(vh - srcR * 2, vh * eyePercent));

      if (debugMode) {
        ctx.drawImage(video, vw/2 - srcR, sy, srcR*2, srcR*2, 0, 0, w, h);
        animationId = requestAnimationFrame(drawKaleidoscope);
        return;
      }

      const wedgeCount = Math.max(6, 24 - density * 2);
      const rMax = Math.sqrt(w * w + h * h);
      const sliceAngle = (Math.PI * 2) / wedgeCount;
      const triAngle = Math.PI * 2 / 3;

      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 0, w, h);
      ctx.clip();

      for (let k = 0; k < wedgeCount; k++) {
        const a0 = k * sliceAngle - Math.PI / 2;
        const a1 = (k + 1) * sliceAngle - Math.PI / 2;

        for (let i = 0; i < 3; i++) {
          const ai0 = a0 + (a1 - a0) * (i / 3);
          const ai1 = a0 + (a1 - a0) * ((i + 1) / 3);
          const x1 = cx + rMax * Math.cos(ai0);
          const y1 = cy + rMax * Math.sin(ai0);
          const x2 = cx + rMax * Math.cos(ai1);
          const y2 = cy + rMax * Math.sin(ai1);

          ctx.save();
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.closePath();
          ctx.clip();

          const mirror = (k + i) % 2 === 1 ? -1 : 1;
          ctx.translate(cx, cy);
          ctx.rotate(-(ai0 + ai1) / 2 - i * triAngle);
          ctx.scale(mirror, 1);
          ctx.translate(-cx, -cy);

          ctx.drawImage(video, vw/2 - srcR, sy, srcR*2, srcR*2, 0, 0, w, h);

          ctx.restore();
        }
      }

      ctx.restore();

      animationId = requestAnimationFrame(drawKaleidoscope);
    }

    toggleBtn.addEventListener('click', () => {
      if (video && stream) {
        stopCamera();
      } else {
        startCamera();
      }
    });

    document.getElementById('debugCheck').addEventListener('change', (e) => {
      debugMode = e.target.checked;
    });

  </script>
</body>
</html>
